version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: coffee_db
      POSTGRES_USER: coffee_user
      POSTGRES_PASSWORD: coffee_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./client
    command: npm start
    volumes:
      - ./client:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
